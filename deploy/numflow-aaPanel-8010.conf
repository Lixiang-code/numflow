# 已部署到：/www/server/panel/vhost/nginx/numflow.conf
# 访问：http://<服务器IP>:8010/ （防火墙需放行 8010）
#
# 运维对齐（与《全链路实机测试报告》一致）：
# - 静态与 /api 反代依赖本机 Uvicorn（默认 127.0.0.1:8000）。合并 backend 代码后务必重启该进程，
#   并核对 openapi.json 是否含 Workbench 所需路径（如 /api/meta/snapshots）。
# - 文档 04 中的 systemd 示例名为 balance-tool；若实际用 aaPanel「Python 项目管理器」或 nohup 启动，
#   请以当前托管方式为准，避免按旧 unit 名排障。

server
{
    listen 8010;
    listen [::]:8010;
    server_name _;
    index index.html;
    root /www/wwwroot/numflow/frontend/dist;
    access_log /www/wwwlogs/numflow.log;
    error_log /www/wwwlogs/numflow.error.log;

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
