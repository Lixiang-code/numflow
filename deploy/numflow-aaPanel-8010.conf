# 已部署到：/www/server/panel/vhost/nginx/numflow.conf
# 访问：http://<服务器IP>:8010/ （防火墙需放行 8010）

server
{
    listen 8010;
    listen [::]:8010;
    server_name _;
    index index.html;
    root /www/wwwroot/numflow/frontend/dist;
    access_log /www/wwwlogs/numflow.log;
    error_log /www/wwwlogs/numflow.error.log;

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
